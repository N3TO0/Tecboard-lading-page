<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="stylesheet" href="css/reset.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon-black.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css">
    <title>Techboard</title>
  </head>
  <body>
    <header>
      <img id="logo_teachboard" src="/src/img/logo-white.png" alt="logo da techboard" />
      <button onclick="page_wite()">
        <img id="icon_page_color" src="/src/icons/icon-light.png" alt="icone de sol" />
      </button>
    </header>

    <main class=".center">
        <section id="#" class=".center">
            <h1 class="h1_content"><span class="text_blue">Fique de olho</span><br>no que importa</h1>
            <p class="p_content">
                Monitoramento em tempo real com alertas inteligentes para sua aplicação
                nunca sair do ar sem você saber.
            </p>
            <a class="a_content" href="">Testar versão demo</a>
            <picture>
              <source media="(min-width: 768px)" srcset="/src/img/img-descktop.png">
              <source media="(min-width: 475px)" srcset="/src/img/img-tablet.png">
              <img src="/src/img/img-cell.png" alt="Dois celulares pretos sobrepostos com uma sombra roxa sobre eles" />
            </picture>
            
        </section>
    </main>
    <script src="js/script.js"></script>
  </body>
</html>
